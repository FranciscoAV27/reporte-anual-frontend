<!-- difusion.component.html -->
<div class="subsec">
  <div class="subsec-title">5.1 Actividades de difusión</div>
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>#</th><th>Nombre de la actividad</th><th>Período inicio</th><th>Período fin</th><th></th></tr>
      </thead>
      <tbody>
        <tr class="empty-row" *ngIf="actividades.length === 0"><td colspan="5">Sin actividades de difusión registradas</td></tr>
        <tr *ngFor="let a of actividades">
          <td class="mono">{{ a.numActividad }}</td>
          <td>{{ a.nombre }}</td>
          <td class="mono">{{ a.periodoInicio ?? '—' }}</td>
          <td class="mono">{{ a.periodoFin    ?? '—' }}</td>
          <td class="td-actions">
            <button class="btn-icon edit" (click)="abrirEditar(a)">✏️</button>
            <button class="btn-icon del"  (click)="eliminar(a.id)">✕</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <button class="btn-add" (click)="abrir()">+ Agregar actividad</button>
</div>

<app-modal [visible]="modalVisible" [titulo]="modalTitulo" [guardando]="modalGuardando" (cerrar)="cerrarModal()" (guardar)="guardarModal()">
  <ng-container [formGroup]="formModal">

    <div class="field-wrap">
      <label>Nombre de la actividad <span class="required">*</span></label>
      <input type="text" formControlName="nombre" placeholder="Nombre de la actividad de difusión">
      <span class="field-error" *ngIf="formModal.get('nombre')?.invalid && formModal.get('nombre')?.touched">
        El nombre de la actividad es obligatorio.
      </span>
    </div>

    <div class="modal-row">
      <div class="field-wrap">
        <label>Período inicio <span class="required">*</span></label>
        <input type="date" formControlName="periodoInicio">
        <span class="field-error" *ngIf="formModal.get('periodoInicio')?.invalid && formModal.get('periodoInicio')?.touched">
          La fecha de inicio es obligatoria.
        </span>
      </div>
      <div class="field-wrap">
        <label>Período fin <span style="color:#888;font-weight:400">(opcional)</span></label>
        <input type="date" formControlName="periodoFin">
      </div>
    </div>

  </ng-container>
</app-modal>
