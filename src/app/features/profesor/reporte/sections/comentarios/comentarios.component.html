<!-- comentarios.component.html -->
<div class="subsec">
  <div class="subsec-title">Resumen general del período</div>
  <div class="field-wrap">
    <textarea
      class="field-textarea"
      style="min-height:140px"
      placeholder="Escribe un resumen de tus actividades y cualquier comentario relevante para el coordinador..."
      [value]="comentarios"
      (input)="comentariosChange.emit($any($event.target).value)"
      rows="7">
    </textarea>
  </div>
  <div class="textos-save-row">
    <button class="btn-save-text" (click)="solicitarGuardar.emit()">
      💾 Guardar comentarios generales
    </button>
  </div>
</div>
